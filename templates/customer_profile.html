{% extends "base.html" %}
{% block content %}

<style>
  .customer-profile-wrap {
    width: 100%;
    max-width: none;
    margin: 0;
    padding: 0 24px;
  }

  .customer-profile-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .customer-profile-card .card-body {
    padding: 18px 20px;
  }

  .toolbar-field label {
    font-size: 12px;
    font-weight: 700;
    color: #667085;
    margin-bottom: 6px;
    display: block;
  }

  .toolbar-field input,
  .toolbar-field textarea {
    width: 100%;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 8px 10px;
  }

  .toolbar-field textarea {
    min-height: 110px;
    resize: vertical;
  }

  .customer-name-save-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: #344054;
    margin-bottom: 8px;
    display: block;
  }

  .default-letter-table {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
  }

  .default-letter-table th {
    text-align: center;
    vertical-align: middle;
    font-size: 13px;
    font-weight: 700;
    color: #667085;
    padding: 8px 6px;
    border-bottom: 1px solid #eaecf0;
  }

  .default-letter-table td {
    padding: 8px 6px;
    border-bottom: 1px solid #f2f4f7;
    vertical-align: middle;
    text-align: center;
  }

  .col-product { width: 32%; }
  .col-um { width: 11%; }
  .col-package { width: 20%; }
  .col-margin { width: 11%; }
  .col-ship { width: 11%; }
  .col-pack { width: 11%; }
  .col-actions { width: 4%; }

  .default-letter-table input,
  .default-letter-table select {
    width: 100%;
    height: 34px;
    padding: 5px 8px;
    font-size: 13px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    box-sizing: border-box;
  }

  .default-letter-table input[type="number"] {
    text-align: center;
  }

  .product-picker-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .product-input {
    height: 34px;
    font-size: 13px;
    padding: 5px 8px;
    text-align: center;
  }

  .row-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }

  .duplicate-btn,
  .remove-row-btn {
    height: 26px;
    width: 26px;
    font-size: 13px;
    line-height: 1;
    border-radius: 6px;
    padding: 0;
    cursor: pointer;
  }

  .duplicate-btn {
    border: 1px solid #d0d5dd;
    background: #fff;
  }

  .duplicate-btn:hover {
    background: #f2f4f7;
  }

  .remove-row-btn {
    border: 1px solid #fda29b;
    background: #fff5f5;
    color: #d92d20;
  }

  .remove-row-btn:hover {
    background: #ffe4e4;
  }

  .default-letter-actions {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .floating-product-panel {
    position: fixed;
    background: #fff;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    box-shadow: 0 12px 24px rgba(16, 24, 40, 0.18);
    z-index: 999999;
    padding: 6px 0;
    max-height: 260px;
    overflow-y: auto;
  }

  .floating-product-panel.hidden {
    display: none;
  }

  .floating-product-option {
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
  }

  .floating-product-option:hover,
  .floating-product-option.active {
    background: #f9fafb;
  }

  .floating-product-empty {
    padding: 8px 10px;
    font-size: 12px;
    color: #667085;
  }

  @media (max-width: 900px) {
    .customer-profile-wrap {
      padding: 0 14px;
    }

    .customer-name-save-row {
      grid-template-columns: 1fr;
    }

    .customer-profile-topbar {
      align-items: flex-start;
    }
  }
</style>

<div class="customer-profile-wrap">
  <div class="customer-profile-topbar">
    <div class="text-muted-small" style="text-align:left;">
      Customer profile settings and default price letter rows
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('customers_page') }}">
      ← Back to Customers
    </a>
  </div>

  <div class="card section-card shadow-sm customer-profile-card">
    <div class="card-body">

      <form method="POST" action="{{ url_for('customer_profile_save', customer_id=customer.id) }}">

        <div class="customer-name-save-row">
          <div class="toolbar-field">
            <label>Customer Name *</label>
            <input name="customer_name" value="{{ customer.name }}" required>
          </div>

          <button class="btn btn-primary btn-sm">Save</button>
        </div>

        <div class="toolbar-field" style="margin-top:12px;">
          <label>Notes</label>
          <textarea name="notes">{{ customer.notes }}</textarea>
        </div>

        <div style="height:1px; background:#e5e7eb; margin:14px 0;"></div>

        <label class="section-label">Default Price Letter</label>

        <div class="table-responsive">
          <table class="table table-sm default-letter-table">
            <thead>
              <tr>
                <th class="col-product">Product</th>
                <th class="col-um">UM</th>
                <th class="col-package">Package</th>
                <th class="col-margin">Margin</th>
                <th class="col-ship">Ship</th>
                <th class="col-pack">Pack</th>
                <th class="col-actions"></th>
              </tr>
            </thead>
            <tbody id="default-letter-rows"></tbody>
          </table>
        </div>

        <div class="default-letter-actions">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="add-default-letter-row-btn">
            Add Product
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<div id="global-product-panel" class="floating-product-panel hidden"></div>

<script>
  const RAW_COMPANY_PRODUCTS = {{ company_products|tojson }};
  const PROFILE_EXISTING_DEFAULT_ROWS = {{ customer.default_letter_rows|tojson }};
  const table = document.getElementById("default-letter-rows");
  const globalProductPanel = document.getElementById("global-product-panel");

  let activePicker = null;
  let activeOptions = [];
  let activeIndex = -1;

  function extractProductName(item) {
    if (typeof item === "string") return item.trim();
    if (!item || typeof item !== "object") return "";
    return String(
      item.product ||
      item.name ||
      item.label ||
      item.title ||
      item.value ||
      ""
    ).trim();
  }

  function normalizedProducts() {
    const names = (Array.isArray(RAW_COMPANY_PRODUCTS) ? RAW_COMPANY_PRODUCTS : [])
      .map(extractProductName)
      .filter(Boolean);

    return [...new Set(names)].sort((a, b) => a.localeCompare(b));
  }

  function createPackageTypeSelect(selectedValue = "") {
    const select = document.createElement("select");
    select.name = "default_row_package_type";

    const options = [
      { value: "", label: "Select" },
      { value: "Bulk", label: "Bulk" },
      { value: "Drum", label: "Drum" },
      { value: "330gal Tote", label: "330gal Tote" },
      { value: "275gal Tote", label: "275gal Tote" },
      { value: "Pail", label: "Pail" },
      { value: "Jug", label: "Jug" },
      { value: "Bottle", label: "Bottle" },
      { value: "Bag", label: "Bag" }
    ];

    options.forEach(opt => {
      const option = document.createElement("option");
      option.value = opt.value;
      option.textContent = opt.label;
      if ((selectedValue || "") === opt.value) {
        option.selected = true;
      }
      select.appendChild(option);
    });

    return select;
  }

  function hideGlobalProductPanel() {
    if (!globalProductPanel) return;
    globalProductPanel.classList.add("hidden");
    globalProductPanel.innerHTML = "";
    activePicker = null;
    activeOptions = [];
    activeIndex = -1;
  }

  function positionGlobalPanel(inputEl) {
    if (!globalProductPanel || !inputEl) return;
    const rect = inputEl.getBoundingClientRect();
    globalProductPanel.style.left = rect.left + "px";
    globalProductPanel.style.top = (rect.bottom + 4) + "px";
    globalProductPanel.style.width = rect.width + "px";
  }

  function setActiveOption(index) {
    const optionEls = Array.from(globalProductPanel.querySelectorAll(".floating-product-option"));
    optionEls.forEach(el => el.classList.remove("active"));

    if (!optionEls.length) {
      activeIndex = -1;
      return;
    }

    if (index < 0) index = optionEls.length - 1;
    if (index >= optionEls.length) index = 0;

    activeIndex = index;
    optionEls[activeIndex].classList.add("active");
    optionEls[activeIndex].scrollIntoView({ block: "nearest" });
  }

  function selectProduct(product) {
    if (!activePicker) return;
    activePicker.hiddenInput.value = product;
    activePicker.textInput.value = product;
    hideGlobalProductPanel();
  }

  function renderGlobalProductPanel(filterText = "") {
    if (!globalProductPanel) return;

    const q = String(filterText || "").trim().toLowerCase();
    const allProducts = normalizedProducts();

    activeOptions = q
      ? allProducts.filter(product => product.toLowerCase().includes(q))
      : allProducts.slice();

    globalProductPanel.innerHTML = "";
    activeIndex = -1;

    if (!activeOptions.length) {
      const empty = document.createElement("div");
      empty.className = "floating-product-empty";
      empty.textContent = "No matching products";
      globalProductPanel.appendChild(empty);
      return;
    }

    activeOptions.forEach((product, idx) => {
      const option = document.createElement("div");
      option.className = "floating-product-option";
      option.textContent = product;
      option.dataset.index = String(idx);

      option.addEventListener("mousedown", function(e) {
        e.preventDefault();
      });

      option.addEventListener("click", function() {
        selectProduct(product);
      });

      globalProductPanel.appendChild(option);
    });
  }

  function openGlobalProductPanel(picker) {
    activePicker = picker;
    positionGlobalPanel(picker.textInput);
    renderGlobalProductPanel(picker.textInput.value);
    globalProductPanel.classList.remove("hidden");
  }

  function createProductPicker(selectedValue = "") {
    const wrapper = document.createElement("div");
    wrapper.className = "product-picker-wrap";

    const hiddenInput = document.createElement("input");
    hiddenInput.type = "hidden";
    hiddenInput.name = "default_row_product";
    hiddenInput.value = selectedValue || "";

    const textInput = document.createElement("input");
    textInput.type = "text";
    textInput.className = "product-input";
    textInput.placeholder = "Select...";
    textInput.autocomplete = "off";
    textInput.value = selectedValue || "";

    const picker = { wrapper, hiddenInput, textInput };

    textInput.addEventListener("focus", function() {
      openGlobalProductPanel(picker);
    });

    textInput.addEventListener("click", function(e) {
      e.stopPropagation();
      openGlobalProductPanel(picker);
    });

    textInput.addEventListener("input", function() {
      hiddenInput.value = textInput.value.trim();
      openGlobalProductPanel(picker);
    });

    textInput.addEventListener("keydown", function(e) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (globalProductPanel.classList.contains("hidden")) {
          openGlobalProductPanel(picker);
        }
        setActiveOption(activeIndex + 1);
        return;
      }

      if (e.key === "ArrowUp") {
        e.preventDefault();
        if (globalProductPanel.classList.contains("hidden")) {
          openGlobalProductPanel(picker);
        }
        setActiveOption(activeIndex - 1);
        return;
      }

      if (e.key === "Enter") {
        if (!globalProductPanel.classList.contains("hidden") && activeIndex >= 0 && activeOptions[activeIndex]) {
          e.preventDefault();
          selectProduct(activeOptions[activeIndex]);
        }
        return;
      }

      if (e.key === "Escape") {
        hideGlobalProductPanel();
      }
    });

    wrapper.appendChild(hiddenInput);
    wrapper.appendChild(textInput);

    return picker;
  }

  function createRow(data = {}) {
    const tr = document.createElement("tr");

    const productTd = document.createElement("td");
    const productPicker = createProductPicker(data.product || "");
    productTd.appendChild(productPicker.wrapper);

    const umTd = document.createElement("td");
    const umSelect = document.createElement("select");
    umSelect.name = "default_row_um";

    ["LB", "GAL", "EACH"].forEach(um => {
      const option = document.createElement("option");
      option.value = um;
      option.textContent = um;
      if ((data.um || "").toUpperCase() === um) {
        option.selected = true;
      }
      umSelect.appendChild(option);
    });
    umTd.appendChild(umSelect);

    const packageTd = document.createElement("td");
    packageTd.appendChild(createPackageTypeSelect(data.package_type || ""));

    const marginTd = document.createElement("td");
    const marginInput = document.createElement("input");
    marginInput.type = "number";
    marginInput.name = "default_row_margin";
    marginInput.step = "0.0001";
    marginInput.value = data.margin !== undefined && data.margin !== null ? data.margin : 15;
    marginTd.appendChild(marginInput);

    const shippingTd = document.createElement("td");
    const shippingInput = document.createElement("input");
    shippingInput.type = "number";
    shippingInput.name = "default_row_shipping";
    shippingInput.step = "0.0001";
    shippingInput.value = data.shipping !== undefined && data.shipping !== null ? data.shipping : 0;
    shippingTd.appendChild(shippingInput);

    const packagingTd = document.createElement("td");
    const packagingInput = document.createElement("input");
    packagingInput.type = "number";
    packagingInput.name = "default_row_packaging";
    packagingInput.step = "0.0001";
    packagingInput.value = data.packaging !== undefined && data.packaging !== null ? data.packaging : 0;
    packagingTd.appendChild(packagingInput);

    const actionsTd = document.createElement("td");
    actionsTd.innerHTML = `
      <div class="row-actions">
        <button type="button" class="duplicate-btn">+</button>
        <button type="button" class="remove-row-btn">-</button>
      </div>
    `;

    actionsTd.querySelector(".duplicate-btn").addEventListener("click", function() {
      createRow({
        product: productPicker.hiddenInput.value || productPicker.textInput.value || "",
        um: umSelect.value || "GAL",
        package_type: packageTd.querySelector("select").value || "",
        margin: marginInput.value || 15,
        shipping: shippingInput.value || 0,
        packaging: packagingInput.value || 0
      });
    });

    actionsTd.querySelector(".remove-row-btn").addEventListener("click", function() {
      tr.remove();
      if (!table.children.length) {
        createRow({});
      }
    });

    tr.appendChild(productTd);
    tr.appendChild(umTd);
    tr.appendChild(packageTd);
    tr.appendChild(marginTd);
    tr.appendChild(shippingTd);
    tr.appendChild(packagingTd);
    tr.appendChild(actionsTd);

    table.appendChild(tr);
  }

  if (PROFILE_EXISTING_DEFAULT_ROWS && PROFILE_EXISTING_DEFAULT_ROWS.length) {
    PROFILE_EXISTING_DEFAULT_ROWS.forEach(r => createRow(r));
  } else {
    createRow({});
  }

  document.getElementById("add-default-letter-row-btn").addEventListener("click", function() {
    createRow({});
  });

  document.addEventListener("click", function(e) {
    if (
      activePicker &&
      !activePicker.wrapper.contains(e.target) &&
      !globalProductPanel.contains(e.target)
    ) {
      hideGlobalProductPanel();
    }
  });

  window.addEventListener("resize", function() {
    if (activePicker) {
      positionGlobalPanel(activePicker.textInput);
    }
  });

  window.addEventListener("scroll", function() {
    if (activePicker) {
      positionGlobalPanel(activePicker.textInput);
    }
  }, true);
</script>

{% endblock %}
